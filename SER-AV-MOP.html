<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SER AV — Method of Procedure 2025</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --done-bg: #0d1f12;
    --done-text: #6e9f77;
    --next-bg: #1a2640;
    --next-border: #2563eb;
    --check-green: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .ser-logo { font-size: 22px; font-weight: 800; color: #4d9de0; letter-spacing: 1px; }
  .ser-logo span { color: #fff; }
  header h1 { font-size: 15px; font-weight: 500; color: var(--text-muted); flex: 1; }
  #btn-reset-all {
    background: #21262d; border: 1px solid #444c56; color: #cdd9e5;
    padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background .15s;
  }
  #btn-reset-all:hover { background: #2d333b; }
  .global-progress {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 24px; display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--text-muted);
  }
  .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--check-green); border-radius: 4px; transition: width .3s ease; }
  main { max-width: 820px; margin: 0 auto; padding: 24px 16px 80px; }
  .phase { margin-bottom: 32px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .phase-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
  }
  .phase-icon { font-size: 20px; }
  .phase-title { flex: 1; font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  .phase-progress { font-size: 12px; opacity: .75; margin-right: 8px; }
  .phase-bar-wrap { width: 80px; background: rgba(255,255,255,0.1); border-radius: 4px; height: 5px; overflow: hidden; margin-right: 10px; }
  .phase-bar-fill { height: 100%; border-radius: 4px; transition: width .3s ease; }
  .phase-reset-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 5px;
    cursor: pointer; font-size: 11px; transition: background .15s;
  }
  .phase-reset-btn:hover { background: rgba(255,255,255,0.15); }
  .phase-chevron { font-size: 12px; opacity: .6; transition: transform .2s; }
  .phase.collapsed .phase-chevron { transform: rotate(-90deg); }
  .phase-body { border-top: 1px solid var(--border); }
  .phase.collapsed .phase-body { display: none; }
  .step {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    transition: background .2s, opacity .2s; cursor: pointer;
  }
  .step:last-child { border-bottom: none; }
  .step:hover:not(.done) { background: var(--surface2); }
  .step.done { background: var(--done-bg); opacity: .6; }
  .step.next-up { background: var(--next-bg); border-left: 3px solid var(--next-border); }
  .step-checkbox {
    width: 20px; height: 20px; min-width: 20px; border-radius: 50%;
    border: 2px solid #444c56; background: transparent;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all .2s;
  }
  .step.done .step-checkbox { background: var(--check-green); border-color: var(--check-green); }
  .step-check-mark { display: none; color: #000; font-size: 11px; font-weight: 900; }
  .step.done .step-check-mark { display: block; }
  .step.next-up .step-checkbox { border-color: var(--next-border); }
  .step-content { flex: 1; min-width: 0; }
  .step-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .step-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--text-muted); }
  .step.done .step-label { color: #4a5a4e; }
  .step-num {
    font-size: 10px; font-weight: 700;
    font-family: "SF Mono", "Fira Code", monospace;
    color: #555f6e; background: #1e242c; border: 1px solid #2d343d;
    border-radius: 4px; padding: 2px 6px; min-width: 38px; text-align: center;
    letter-spacing: .5px; transition: color .2s; white-space: nowrap;
  }
  .step.done .step-num { color: #3a5a42; border-color: #2a3d30; }
  .step.next-up .step-num { color: #5b8dee; border-color: #2a3f6e; background: #141e30; }
  .step-text { font-size: 14px; line-height: 1.55; color: var(--text); }
  .step.done .step-text { color: var(--done-text); text-decoration: line-through; }
</style>
</head>
<body>

<header>
  <div class="ser-logo">S<span>.</span>E<span>.</span>R<span>.</span></div>
  <h1>Audiovisual — Method of Procedure 2025</h1>
  <button id="btn-reset-all">&#x21BA; Reset All</button>
</header>

<div class="global-progress">
  <span id="global-label">0 / 41 steps complete</span>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="global-bar" style="width:0%"></div>
  </div>
</div>

<main id="main-content"></main>

<script>
var PHASES = [
  { id: "opening", title: "Opening Setup", color: "#1a56a0", icon: "\uD83D\uDD0C", steps: [
    { num: "O-1",  label: "\uD83D\uDCBB COMPUTER",       text: "Verify COMPUTER is ON. Turn on monitors, mouse and keyboard." },
    { num: "O-2",  label: "\uD83D\uDCBB COMPUTER",       text: "Press SPACE key to show PIN dialog box. Enter the 6-digit PIN (publication of The Spirits\u2019 Book in YYYYMM format)." },
    { num: "O-3",  label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "MIXER ON: power button is on the rear-right of the mixer." },
    { num: "O-4",  label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "SPEAKERS ON: press both speaker buttons on AV wall near mixer (left side). Watch for the speaker LEDs to turn ON." },
    { num: "O-5",  label: "\uD83C\uDFAC PROJECTOR",      text: "PROJECTOR ON: use white remote control. Press the power button (red) pointing towards the receiver on the AV area." },
    { num: "O-6",  label: "\uD83C\uDFAC PROJECTOR",      text: "PROJECTOR input: Press 8 on remote to switch \u2014 1=PC AV, 2=Podium." },
    { num: "O-7",  label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "Podium lights ON \u2014 switch is on the back wall (behind your back)." },
    { num: "O-8",  label: "\uD83D\uDCBB COMPUTER",       text: "Open MS Edge internet browser. Navigate to the favorites bar and click on \u201cSER AV\u201d." },
    { num: "O-9",  label: "\uD83D\uDCBB COMPUTER",       text: "Open PowerPoint \u2014 SLIDE MUSICA: Right-click the file \u2192 hover over \u201cOpen\u201d \u2192 click \u201cOpen in App\u201d." },
    { num: "O-10", label: "\uD83D\uDCBB COMPUTER",       text: "Repeat for file named \u201cavisos\u2026\u201d \u2014 Right-click \u2192 hover over \u201cOpen\u201d \u2192 click \u201cOpen in App\u201d." }
  ]},
  { id: "alegria", title: "Alegria Crist\u00e3", color: "#2e7d32", icon: "\uD83C\uDFB5", steps: [
    { num: "AC-1", label: "\uD83D\uDCBB COMPUTER",       text: "Put SLIDE MUSICA in presentation mode." },
    { num: "AC-2", label: "\uD83D\uDCBB COMPUTER",       text: "The initial slide shows a menu of songs. Upon request by musicians, click on the song name to display it." },
    { num: "AC-3", label: "\uD83D\uDCBB COMPUTER",       text: "Click on the song name again to return to the menu. Pay attention for the next song request." },
    { num: "AC-4", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "MIXER: Turn ON channels 1 through 6. Verify with musicians \u2014 they may not need all channels." }
  ]},
  { id: "avisos", title: "Avisos & Lecture", color: "#6a1b9a", icon: "\uD83D\uDCE2", steps: [
    { num: "AL-1",  label: "\uD83D\uDD0A AUDIO & LIGHTS",         text: "MIXER \u2014 Channels 1\u20136: OFF. Podium / Channel 7: ON. PC Podium audio (if needed): Channels 9/10." },
    { num: "AL-2",  label: "\uD83C\uDFAC PROJECTOR",              text: "PROJECTOR input: Press 8 on remote to switch from HDMI 1 (PC AV) to HDMI 2 (Podium) if presenter is at podium." },
    { num: "AL-3",  label: "\uD83D\uDCBB COMPUTER",               text: "Open Streamyard: In MS Edge favorites, click on Streamyard (already logged in)." },
    { num: "AL-4",  label: "\uD83D\uDCBB COMPUTER",               text: "Find the title of the presentation, then click \u201cEnter Studio\u201d." },
    { num: "AL-5",  label: "\uD83D\uDCBB COMPUTER",               text: "On the next screen, click \u201cEnter Studio\u201d again." },
    { num: "AL-6",  label: "\uD83D\uDCBB COMPUTER",               text: "Click Present \u2192 Choose screen \u2192 pick the projector screen." },
    { num: "AL-7",  label: "\uD83D\uDCBB COMPUTER",               text: "Put \u201cavisos\u2026\u201d PowerPoint in presentation mode." },
    { num: "AL-8",  label: "\uD83D\uDCBB COMPUTER",               text: "Make sure the clicker/pointer is at the podium and is turned ON." },
    { num: "AL-9",  label: "\uD83D\uDCBB COMPUTER",               text: "\u26A0\uFE0F Click \u201cGo Live\u201d in Streamyard \u2192 confirm. NOTE: PowerPoint window must be active for the clicker to work." },
    { num: "AL-10", label: "\uD83D\uDCBB COMPUTER",               text: "\u26A0\uFE0F Streamyard mic can be ON in ONE computer only." },
    { num: "AL-11", label: "\uD83D\uDCBB COMPUTER \u2014 Presenter", text: "Share the Streamyard guest link with the presenter." },
    { num: "AL-12", label: "\uD83D\uDCBB PRESENTER\u2019S COMPUTER", text: "Presenter joins Streamyard and shares their screen. Microphone: OFF \u2192 turn ON only when playing video. Camera: OFF." },
    { num: "AL-13", label: "\uD83D\uDCBB COMPUTER",               text: "At the end of broadcast: click \u201cEnd Broadcast\u201d \u2192 confirm." }
  ]},
  { id: "passes", title: "Passes", color: "#00838f", icon: "\uD83D\uDE4F", steps: [
    { num: "P-1", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "MIXER: Turn off channels 1 through 10. Turn on Channel 11/12 (PC AV)." },
    { num: "P-2", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "LIGHTS: Blue lights ON. White ceiling lights OFF \u2014 see two buttons on AV wall near mixer (left side)." },
    { num: "P-3", label: "\uD83D\uDCBB COMPUTER",       text: "Open Passe slides: On SharePoint SER AV, find file \u201cPasse\u2026\u201d \u2192 Right-click \u2192 hover over \u2192 Open in App \u2192 Slideshow. Slides will run automatically." },
    { num: "P-4", label: "\uD83D\uDCBB COMPUTER",       text: "Minimize all windows. On the Desktop, open the shortcut \u201cmusicas passe\u201d." },
    { num: "P-5", label: "\uD83D\uDCBB COMPUTER",       text: "Select all (Ctrl+A) \u2192 right-click \u2192 hover over \u2192 Play." },
    { num: "P-6", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "Adjust volume for Channel 11/12 as needed." }
  ]},
  { id: "closing", title: "Closing Setup", color: "#c62828", icon: "\uD83D\uDD12", steps: [
    { num: "C-1", label: "\uD83D\uDCBB COMPUTER",       text: "PC AV: Power OFF." },
    { num: "C-2", label: "\uD83D\uDCBB COMPUTER",       text: "BONUS: Ensure entrance door is locked \u2014 check handle and deadbolt." },
    { num: "C-3", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "SPEAKERS OFF: press both buttons on AV wall near mixer. Observe their LEDs turn OFF." },
    { num: "C-4", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "MIXER: Channel 11/12 OFF." },
    { num: "C-5", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "MIXER OFF: switch button is on the rear-right." },
    { num: "C-6", label: "\uD83C\uDFAC PROJECTOR",      text: "PROJECTOR OFF: press power button, then press again to confirm." },
    { num: "C-7", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "Podium lights OFF \u2014 switch on back wall (behind your back)." },
    { num: "C-8", label: "\uD83D\uDD0A AUDIO & LIGHTS", text: "Blue lights OFF." }
  ]}
];

var TOTAL_STEPS = PHASES.reduce(function(s, p) { return s + p.steps.length; }, 0);
var state = PHASES.map(function(p) { return p.steps.map(function() { return false; }); });

function isNextStep(tpi, tsi) {
  for (var pi = 0; pi < PHASES.length; pi++) {
    for (var si = 0; si < PHASES[pi].steps.length; si++) {
      if (!state[pi][si]) return pi === tpi && si === tsi;
    }
  }
  return false;
}

function updateGlobalProgress() {
  var done = state.reduce(function(sum, arr) { return sum + arr.filter(Boolean).length; }, 0);
  document.getElementById('global-bar').style.width = Math.round(done / TOTAL_STEPS * 100) + '%';
  document.getElementById('global-label').textContent = done + ' / ' + TOTAL_STEPS + ' steps complete';
}

function updatePhaseProgress(pi) {
  var phaseEl = document.querySelector('[data-pi="' + pi + '"]');
  if (!phaseEl) return;
  var done = state[pi].filter(Boolean).length;
  var total = PHASES[pi].steps.length;
  phaseEl.querySelector('.phase-progress').textContent = done + '/' + total;
  phaseEl.querySelector('.phase-bar-fill').style.width = Math.round(done / total * 100) + '%';
}

function refreshStep(pi, si) {
  var stepEl = document.querySelector('.step[data-pi="' + pi + '"][data-si="' + si + '"]');
  if (!stepEl) return;
  var done = state[pi][si];
  var next = !done && isNextStep(pi, si);
  stepEl.className = 'step' + (done ? ' done' : '') + (next ? ' next-up' : '');
}

function refreshAll() {
  for (var pi = 0; pi < PHASES.length; pi++) {
    for (var si = 0; si < PHASES[pi].steps.length; si++) { refreshStep(pi, si); }
    updatePhaseProgress(pi);
  }
  updateGlobalProgress();
}

function toggleStep(pi, si) { state[pi][si] = !state[pi][si]; refreshAll(); }
function togglePhase(pi) {
  var el = document.querySelector('[data-pi="' + pi + '"]');
  if (el) el.classList.toggle('collapsed');
}
function resetPhase(pi) { state[pi] = state[pi].map(function() { return false; }); refreshAll(); }
function resetAll() {
  for (var pi = 0; pi < PHASES.length; pi++) state[pi] = state[pi].map(function() { return false; });
  refreshAll();
}

function makeStepEl(pi, si) {
  var step = PHASES[pi].steps[si];
  var el = document.createElement('div');
  el.className = 'step';
  el.setAttribute('data-pi', pi);
  el.setAttribute('data-si', si);
  el.addEventListener('click', (function(p, s) { return function() { toggleStep(p, s); }; })(pi, si));

  var cb = document.createElement('div');
  cb.className = 'step-checkbox';
  var ck = document.createElement('span');
  ck.className = 'step-check-mark';
  ck.textContent = '\u2713';
  cb.appendChild(ck);

  var content = document.createElement('div');
  content.className = 'step-content';

  var labelRow = document.createElement('div');
  labelRow.className = 'step-label-row';

  var labelEl = document.createElement('div');
  labelEl.className = 'step-label';
  labelEl.textContent = step.label;

  var numEl = document.createElement('div');
  numEl.className = 'step-num';
  numEl.textContent = step.num;

  labelRow.appendChild(labelEl);
  labelRow.appendChild(numEl);

  var textEl = document.createElement('div');
  textEl.className = 'step-text';
  textEl.textContent = step.text;

  content.appendChild(labelRow);
  content.appendChild(textEl);
  el.appendChild(cb);
  el.appendChild(content);
  return el;
}

function makePhaseEl(pi) {
  var phase = PHASES[pi];
  var phaseEl = document.createElement('div');
  phaseEl.className = 'phase';
  phaseEl.setAttribute('data-pi', pi);

  var header = document.createElement('div');
  header.className = 'phase-header';
  header.style.background = phase.color + '22';
  header.style.borderLeft = '4px solid ' + phase.color;
  header.addEventListener('click', (function(p) {
    return function(e) { if (!e.target.classList.contains('phase-reset-btn')) togglePhase(p); };
  })(pi));

  var iconEl = document.createElement('span');
  iconEl.className = 'phase-icon';
  iconEl.textContent = phase.icon;

  var titleEl = document.createElement('span');
  titleEl.className = 'phase-title';
  titleEl.textContent = phase.title;

  var progressEl = document.createElement('span');
  progressEl.className = 'phase-progress';
  progressEl.textContent = '0/' + phase.steps.length;

  var barWrap = document.createElement('div');
  barWrap.className = 'phase-bar-wrap';
  var barFill = document.createElement('div');
  barFill.className = 'phase-bar-fill';
  barFill.style.background = phase.color;
  barFill.style.width = '0%';
  barWrap.appendChild(barFill);

  var resetBtn = document.createElement('button');
  resetBtn.className = 'phase-reset-btn';
  resetBtn.textContent = '\u21BA Reset';
  resetBtn.addEventListener('click', (function(p) {
    return function(e) { e.stopPropagation(); resetPhase(p); };
  })(pi));

  var chevron = document.createElement('span');
  chevron.className = 'phase-chevron';
  chevron.textContent = '\u25BE';

  header.appendChild(iconEl);
  header.appendChild(titleEl);
  header.appendChild(progressEl);
  header.appendChild(barWrap);
  header.appendChild(resetBtn);
  header.appendChild(chevron);
  phaseEl.appendChild(header);

  var body = document.createElement('div');
  body.className = 'phase-body';
  phase.steps.forEach(function(_, si) { body.appendChild(makeStepEl(pi, si)); });
  phaseEl.appendChild(body);
  return phaseEl;
}

document.addEventListener('DOMContentLoaded', function() {
  var main = document.getElementById('main-content');
  PHASES.forEach(function(_, pi) { main.appendChild(makePhaseEl(pi)); });
  document.getElementById('btn-reset-all').addEventListener('click', resetAll);
  refreshAll();
});
</script>
</body>
</html>
